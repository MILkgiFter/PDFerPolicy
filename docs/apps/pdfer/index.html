<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex" />
    <title>PDFer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --card: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #fb7185;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 1.5rem 1rem 2rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
        font-size: 0.9375rem;
      }
      .wrap {
        max-width: 34rem;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0 0 0.35rem;
      }
      .sub {
        color: var(--muted);
        margin: 0 0 1.25rem;
        font-size: 0.875rem;
      }
      .card {
        background: var(--card);
        border: 1px solid rgba(251, 113, 133, 0.2);
        border-radius: 1rem;
        padding: 1rem 1.15rem;
      }
      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      li {
        margin-bottom: 0.65rem;
      }
      a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      p.en {
        margin-top: 1.25rem;
        font-size: 0.8125rem;
        color: var(--muted);
      }
      .back {
        display: inline-block;
        margin-bottom: 1rem;
        font-size: 0.8125rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="../..">← Все приложения · All apps</a>
      <h1>PDFer</h1>
      <p class="sub"><code>com.pdfer.app</code> · Android</p>
      <ul class="card" aria-label="Ссылки">
        <li><a href="privacy.html">Политика конфиденциальности · Privacy policy</a></li>
        <li>
          <a href="https://play.google.com/store/apps/details?id=com.pdfer.app" rel="noopener noreferrer" target="_blank"
            >Google Play</a
          >
        </li>
      </ul>
      <p class="en" lang="en">
        AdMob verification uses one <strong>app-ads.txt</strong> at the site root (parent URL), shared across apps on this
        developer portal.
      </p>
    </div>
  </body>
</html>
