<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png?v=4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#be123c" />
    <title>PDFer — инструменты PDF на устройстве</title>
    <style>
      html,
      body {
        margin: 0;
        background-color: #020617;
      }
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: linear-gradient(180deg, #0f172a 0%, #020617 52%, #020617 100%);
        font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        -webkit-font-smoothing: antialiased;
      }
      #app-splash.app-splash--out {
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .app-splash__accent {
        height: 1px;
        flex-shrink: 0;
        background: linear-gradient(90deg, transparent, rgba(251, 113, 133, 0.4), transparent);
      }
      .app-splash__main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.125rem;
        padding: min(2rem, 6vw);
        padding-top: max(min(2rem, 6vw), env(safe-area-inset-top));
        padding-bottom: max(min(2rem, 6vw), env(safe-area-inset-bottom));
      }
      .app-splash__logo {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 1rem;
        box-shadow:
          0 12px 40px rgb(0 0 0 / 0.45),
          0 0 0 1px rgba(251, 113, 133, 0.22);
        animation: app-splash-pulse 2.1s ease-in-out infinite;
      }
      @keyframes app-splash-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.93;
          transform: scale(0.985);
        }
      }
      .app-splash__title {
        margin: 0;
        font-size: 1.3125rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #f1f5f9;
      }
      .app-splash__sub {
        margin: 0;
        max-width: 16rem;
        text-align: center;
        font-size: 0.8125rem;
        line-height: 1.45;
        color: rgb(148 163 184 / 0.9);
      }
      .app-splash__bar {
        width: min(9rem, 42vw);
        height: 3px;
        margin-top: 0.25rem;
        border-radius: 999px;
        overflow: hidden;
        background: rgb(30 41 59 / 0.85);
      }
      .app-splash__bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(90deg, #be123c, #fb7185);
        animation: app-splash-bar 1.1s ease-in-out infinite alternate;
      }
      @keyframes app-splash-bar {
        0% {
          transform: translateX(-20%);
        }
        100% {
          transform: translateX(220%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash__accent"></div>
      <div class="app-splash__main">
        <img class="app-splash__logo" src="/icon.png?v=4" alt="" width="72" height="72" decoding="async" />
        <div>
          <p class="app-splash__title">PDFer</p>
          <p class="app-splash__sub">Инструменты PDF на устройстве</p>
        </div>
        <div class="app-splash__bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
